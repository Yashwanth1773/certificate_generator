<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family: Arial, sans-serif;

            min-height:100vh;

            background-image:
                    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                    url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .main-container{

            width:100%;
            max-width:1100px;

            background:rgba(255,255,255,0.95);

            border-radius:20px;

            padding:30px;

            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .title{

            text-align:center;
            margin-bottom:25px;
        }

        .title h1{

            color:#1a237e;
            margin-bottom:10px;
        }

        .form-section{

            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;

            margin-bottom:25px;
        }

        input{

            padding:12px;

            width:230px;

            border-radius:10px;

            border:1px solid #ccc;

            font-size:15px;
        }

        button{

            padding:12px 20px;

            border:none;

            border-radius:10px;

            background:#1a237e;

            color:white;

            font-size:15px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#3949ab;
        }

        .canvas-container{

            display:flex;
            justify-content:center;
        }

        canvas{

            display:none;

            border:10px solid #d4af37;

            background:white;

            box-shadow:0 5px 20px rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>

<div class="main-container">

    <div class="title">

        <h1>Certificate Generator</h1>
        <p>Create Professional Certificates</p>

    </div>

    <div class="form-section">

        <input type="text"
               id="studentName"
               placeholder="Enter Student Name">

        <input type="text"
               id="courseName"
               placeholder="Enter Course Name">

        <input type="date"
               id="issueDate">

        <button onclick="generateCertificate()">
            Generate Certificate
        </button>

        <button onclick="downloadCertificate()">
            Download Certificate
        </button>

    </div>

    <div class="canvas-container">

        <canvas id="certificateCanvas"
                width="1000"
                height="700"></canvas>

    </div>

</div>

<script>

    const canvas =
        document.getElementById("certificateCanvas");

    const ctx =
        canvas.getContext("2d");

    const logo =
        new Image();

    logo.src =
        "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    const qr =
        new Image();

    qr.src =
        "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CertificateVerification";

    function generateCertificate(){

        const studentName =
            document.getElementById("studentName").value;

        const courseName =
            document.getElementById("courseName").value;

        const issueDate =
            document.getElementById("issueDate").value;

        if(studentName === "" ||
            courseName === "" ||
            issueDate === ""){

            alert("Please fill all details");

            return;
        }

        canvas.style.display = "block";

        // Background

        ctx.fillStyle = "#fffdf5";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // Outer Border

        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 15;
        ctx.strokeRect(20,20,960,660);

        // Inner Border

        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        ctx.strokeRect(40,40,920,620);

        // Logo

        ctx.drawImage(logo,60,50,90,90);

        // Company Name

        ctx.fillStyle = "#1a237e";

        ctx.font = "bold 40px Georgia";

        ctx.textAlign = "center";

        ctx.fillText(
            "YASHWANTH TECHNOLOGIES",
            500,
            90
        );

        // Subtitle

        ctx.font = "24px Arial";

        ctx.fillStyle = "#444";

        ctx.fillText(
            "Certificate of Completion",
            500,
            160
        );

        // Decorative line

        ctx.beginPath();
        ctx.moveTo(250,180);
        ctx.lineTo(750,180);
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Main Text

        ctx.font = "28px Arial";
        ctx.fillStyle = "#000";

        ctx.fillText(
            "This certificate is proudly presented to",
            500,
            260
        );

        // Student Name

        ctx.font = "bold 42px Georgia";
        ctx.fillStyle = "#b8860b";

        ctx.fillText(
            studentName,
            500,
            340
        );

        // Course text

        ctx.font = "28px Arial";
        ctx.fillStyle = "#000";

        ctx.fillText(
            "for successfully completing the course",
            500,
            410
        );

        // Course Name

        ctx.font = "bold 36px Georgia";
        ctx.fillStyle = "#1a237e";

        ctx.fillText(
            courseName,
            500,
            480
        );

        // Date

        ctx.font = "22px Arial";
        ctx.fillStyle = "#333";

        ctx.fillText(
            "Issued Date: " + issueDate,
            500,
            550
        );

        // QR Code

        ctx.drawImage(
            qr,
            70,
            520,
            120,
            120
        );

        // Signature Line

        ctx.beginPath();
        ctx.moveTo(720,580);
        ctx.lineTo(900,580);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Signature Text

        ctx.font = "22px Arial";

        ctx.fillText(
            "Authorized Signature",
            810,
            620
        );

    }

    function downloadCertificate() {

        if(canvas.style.display === "none"){

            alert("Generate certificate first");

            return;
        }

        const image =
            canvas.toDataURL("image/png");

        const link =
            document.createElement("a");

        link.href = image;

        link.download = "certificate.png";

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);
    }

</script>

</body>

</html>
